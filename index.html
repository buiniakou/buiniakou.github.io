<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #111;
  color: #f0f0f0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  transition: background 0.35s, color 0.35s;
  user-select: none;
}

/* ── Top controls ── */
.ctrl {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 10px 16px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.fb, .tb {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.18);
  background: transparent;
  color: #f0f0f0;
  font-size: 12px;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  font-family: 'Inter', system-ui;
}
.fb.on { background: rgba(255,255,255,0.14); }
.tb.on { background: rgba(255,255,255,0.14); }
.sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); margin: 0 3px; }

/* ── Face display area ── */
.display {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 2rem;
  min-height: 0;
}
.face { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
.face.on { display: flex; }

/* DIGITAL */
.dig-time  { font-size: clamp(56px, 14vw, 160px); font-weight: 500; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
.dig-ampm  { font-size: clamp(14px, 3vw, 26px); font-weight: 400; opacity: 0.4; margin-top: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
.dig-date  { font-size: clamp(11px, 1.4vw, 15px); opacity: 0.35; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 14px; }

/* ANALOG */
.a-date { font-size: 12px; opacity: 0.35; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 12px; }

/* FLIP */
.flip-row  { display: flex; align-items: center; gap: 6px; }
.flip-grp  { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.flip-pair { display: flex; gap: 4px; }
.flip-card { border-radius: 8px; display: flex; align-items: center; justify-content: center; width: 54px; height: 72px; overflow: hidden; background: rgba(255,255,255,0.08); }
.flip-n    { font-size: 54px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; }
@keyframes flipit {
  0%   { transform: scaleY(1);    opacity: 1;   }
  45%  { transform: scaleY(0.04); opacity: 0.3; }
  55%  { transform: scaleY(0.04); opacity: 0.3; }
  100% { transform: scaleY(1);    opacity: 1;   }
}
.flip-card.pop .flip-n { animation: flipit 0.3s cubic-bezier(0.4,0,0.2,1); }
.flip-lbl  { font-size: 10px; opacity: 0.28; letter-spacing: 0.1em; text-transform: uppercase; }
.flip-sep  { font-size: 48px; font-weight: 300; opacity: 0.28; line-height: 1; margin-bottom: 16px; }
.flip-ampm { font-size: 13px; opacity: 0.35; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 10px; }

/* BINARY */
.bin-wrap  { display: flex; flex-direction: column; gap: 16px; }
.bin-row   { display: flex; align-items: center; gap: 10px; }
.bin-lbl   { font-size: 11px; opacity: 0.3; width: 16px; text-align: right; letter-spacing: 0.06em; }
.bin-dots  { display: flex; gap: 8px; align-items: center; }
.bit       { width: 20px; height: 20px; border-radius: 50%; transition: background 0.18s, opacity 0.18s; }
.bit.on    { opacity: 1; }
.bit.off   { opacity: 0.12; }
.bin-val   { font-size: 13px; opacity: 0.32; font-variant-numeric: tabular-nums; width: 26px; letter-spacing: 0.04em; }
.bin-pow-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.bin-pow-lbl { width: 16px; }
.pow-num   { width: 20px; text-align: center; font-size: 9px; opacity: 0.22; }

/* WORD */
.word-txt   { font-size: clamp(22px, 4.5vw, 44px); font-weight: 400; text-align: center; line-height: 1.5; max-width: 520px; font-family: 'Lora', Georgia, serif; }
.word-exact { font-size: 12px; opacity: 0.3; margin-top: 18px; letter-spacing: 0.1em; font-variant-numeric: tabular-nums; }

/* ── Bottom tray ── */
.tray {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding: 10px 0 16px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.sw {
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.sw:hover { transform: scale(1.2); }
</style>
</head>
<body>

<!-- Controls -->
<div class="ctrl" id="ctrl">
  <button class="fb on" id="fb-digital" onclick="setFace('digital')">Digital</button>
  <button class="fb"    id="fb-analog"  onclick="setFace('analog')">Analog</button>
  <button class="fb"    id="fb-flip"    onclick="setFace('flip')">Flip</button>
  <button class="fb"    id="fb-binary"  onclick="setFace('binary')">Binary</button>
  <button class="fb"    id="fb-word"    onclick="setFace('word')">Word</button>
  <div class="sep"></div>
  <button class="tb on" id="tb12h" onclick="tog12h()">12h</button>
  <button class="tb on" id="tbsec" onclick="togSec()">Secs</button>
  <button class="tb"    id="tbsmo" onclick="togSmooth()">Smooth</button>
</div>

<!-- Display -->
<div class="display">

  <div class="face on" id="face-digital">
    <div class="dig-time" id="d-time">00:00</div>
    <div class="dig-ampm" id="d-ampm"></div>
    <div class="dig-date" id="d-date"></div>
  </div>

  <div class="face" id="face-analog">
    <svg id="asvg" viewBox="0 0 200 200" style="width:min(280px,50vh);height:min(280px,50vh)" role="img" aria-label="Analog clock">
      <circle cx="100" cy="100" r="97" fill="none" id="a-ring" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <g id="a-ticks"></g>
      <g id="a-nums"></g>
      <line id="a-h" x1="100" y1="100" x2="100" y2="50"  stroke="#f0f0f0" stroke-width="5.5" stroke-linecap="round"/>
      <line id="a-m" x1="100" y1="108" x2="100" y2="28"  stroke="#f0f0f0" stroke-width="3.5" stroke-linecap="round"/>
      <line id="a-s" x1="100" y1="120" x2="100" y2="22"  stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="5"   fill="#f0f0f0" id="a-dot"/>
      <circle cx="100" cy="100" r="2.5" fill="#ef4444"/>
    </svg>
    <div class="a-date" id="a-date"></div>
  </div>

  <div class="face" id="face-flip">
    <div class="flip-row">
      <div class="flip-grp">
        <div class="flip-pair">
          <div class="flip-card" id="fc-h0"><div class="flip-n" id="fv-h0">0</div></div>
          <div class="flip-card" id="fc-h1"><div class="flip-n" id="fv-h1">0</div></div>
        </div>
        <div class="flip-lbl">hours</div>
      </div>
      <div class="flip-sep">:</div>
      <div class="flip-grp">
        <div class="flip-pair">
          <div class="flip-card" id="fc-m0"><div class="flip-n" id="fv-m0">0</div></div>
          <div class="flip-card" id="fc-m1"><div class="flip-n" id="fv-m1">0</div></div>
        </div>
        <div class="flip-lbl">mins</div>
      </div>
      <div class="flip-sep" id="fsep">:</div>
      <div class="flip-grp" id="fsg">
        <div class="flip-pair">
          <div class="flip-card" id="fc-s0"><div class="flip-n" id="fv-s0">0</div></div>
          <div class="flip-card" id="fc-s1"><div class="flip-n" id="fv-s1">0</div></div>
        </div>
        <div class="flip-lbl">secs</div>
      </div>
    </div>
    <div class="flip-ampm" id="f-ampm"></div>
  </div>

  <div class="face" id="face-binary">
    <div class="bin-wrap">
      <div class="bin-pow-row">
        <div class="bin-pow-lbl"></div>
        <div class="bin-dots" id="bin-pow"></div>
      </div>
      <div class="bin-row"><span class="bin-lbl">H</span><div class="bin-dots" id="bd-h"></div><span class="bin-val" id="bv-h">00</span></div>
      <div class="bin-row"><span class="bin-lbl">M</span><div class="bin-dots" id="bd-m"></div><span class="bin-val" id="bv-m">00</span></div>
      <div class="bin-row" id="bin-s-row"><span class="bin-lbl">S</span><div class="bin-dots" id="bd-s"></div><span class="bin-val" id="bv-s">00</span></div>
    </div>
  </div>

  <div class="face" id="face-word">
    <div class="word-txt" id="w-txt">loading…</div>
    <div class="word-exact" id="w-exact"></div>
  </div>

</div>

<!-- Theme tray -->
<div class="tray" id="tray"></div>

<script>
const THEMES = [
  { n:'Midnight', bg:'#111111', text:'#f0f0f0', fc:'rgba(255,255,255,0.09)', dot:'#2a78d6', lt:false },
  { n:'Slate',    bg:'#1a2740', text:'#c8d8f0', fc:'rgba(255,255,255,0.09)', dot:'#4a9ef5', lt:false },
  { n:'Forest',   bg:'#0f2318', text:'#9fe1cb', fc:'rgba(255,255,255,0.09)', dot:'#1d9e75', lt:false },
  { n:'Plum',     bg:'#1a0f2e', text:'#d0c4f8', fc:'rgba(255,255,255,0.09)', dot:'#9085e9', lt:false },
  { n:'Ember',    bg:'#1f1008', text:'#f5c47a', fc:'rgba(255,255,255,0.09)', dot:'#ef9f27', lt:false },
  { n:'Graphite', bg:'#2a2a28', text:'#d8d7d0', fc:'rgba(255,255,255,0.09)', dot:'#b4b2a9', lt:false },
  { n:'Rose',     bg:'#fbeaf0', text:'#72243e', fc:'rgba(0,0,0,0.07)',       dot:'#d4537e', lt:true  },
  { n:'Sky',      bg:'#e6f1fb', text:'#0c447c', fc:'rgba(0,0,0,0.07)',       dot:'#2a78d6', lt:true  },
  { n:'Paper',    bg:'#f5f4ef', text:'#2c2c2a', fc:'rgba(0,0,0,0.07)',       dot:'#5f5e5a', lt:true  },
  { n:'Sage',     bg:'#eaf3de', text:'#274f0a', fc:'rgba(0,0,0,0.07)',       dot:'#3b6d11', lt:true  },
];

const S = { face:'digital', h12:true, secs:true, smooth:false, theme:0 };
const q = id => document.getElementById(id);

/* Analog: build ticks + numbers */
(function() {
  const tg=q('a-ticks'), ng=q('a-nums');
  for (let i=0;i<60;i++) {
    const a=i/60*2*Math.PI, major=i%5===0, r1=major?83:91;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',100+r1*Math.sin(a)); l.setAttribute('y1',100-r1*Math.cos(a));
    l.setAttribute('x2',100+97*Math.sin(a)); l.setAttribute('y2',100-97*Math.cos(a));
    l.setAttribute('stroke-width',major?'2':'1'); l.setAttribute('class','a-tick');
    tg.appendChild(l);
  }
  for (let i=1;i<=12;i++) {
    const a=i/12*2*Math.PI;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',100+72*Math.sin(a)); t.setAttribute('y',100-72*Math.cos(a));
    t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size','11'); t.setAttribute('font-family','Inter,system-ui');
    t.setAttribute('class','a-num'); t.textContent=i; ng.appendChild(t);
  }
})();

/* Binary: build power header + bit rows */
(function() {
  const BITS=6, pw=q('bin-pow');
  for (let i=BITS-1;i>=0;i--) {
    const d=document.createElement('div');
    d.className='pow-num'; d.textContent=Math.pow(2,i); pw.appendChild(d);
  }
  ['h','m','s'].forEach(r => {
    const c=q('bd-'+r);
    for (let i=BITS-1;i>=0;i--) {
      const d=document.createElement('div'); d.className='bit off'; d.id='b-'+r+'-'+i; c.appendChild(d);
    }
  });
})();

/* Theme swatches */
(function() {
  const tray=q('tray');
  THEMES.forEach((t,i) => {
    const s=document.createElement('div'); s.className='sw'; s.style.background=t.bg;
    if (t.lt) s.style.outline='1px solid rgba(0,0,0,0.14)';
    s.title=t.n; s.onclick=()=>applyTheme(i); tray.appendChild(s);
  });
})();

function applyTheme(i) {
  S.theme=i;
  const t=THEMES[i];
  const sep = t.lt ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
  const bc  = t.lt ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.2)';
  const ab  = t.lt ? 'rgba(0,0,0,0.1)'  : 'rgba(255,255,255,0.14)';

  document.body.style.background=t.bg; document.body.style.color=t.text;

  const ctrl=q('ctrl');
  ctrl.style.borderBottom='1px solid '+sep;
  ctrl.style.background=t.lt?'rgba(0,0,0,0.03)':'rgba(255,255,255,0.03)';
  document.querySelectorAll('.sep').forEach(el=>el.style.background=sep);
  document.querySelectorAll('.fb,.tb').forEach(el=>{ el.style.color=t.text; el.style.borderColor=bc; el.style.background='transparent'; });
  ['digital','analog','flip','binary','word'].forEach(f => {
    if (S.face===f) q('fb-'+f).style.background=ab;
  });
  q('tb12h').style.background=S.h12?ab:'transparent';
  q('tbsec').style.background=S.secs?ab:'transparent';
  q('tbsmo').style.background=S.smooth?ab:'transparent';

  q('tray').style.borderTop='1px solid '+sep;
  document.querySelectorAll('.sw').forEach((s,idx) => {
    s.style.borderColor=idx===i?(t.lt?'rgba(0,0,0,0.55)':'rgba(255,255,255,0.9)'):'transparent';
    s.style.transform=idx===i?'scale(1.18)':'';
  });

  const hc=t.text;
  const tc=t.lt?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.18)';
  const nc=t.lt?'rgba(0,0,0,0.3)' :'rgba(255,255,255,0.38)';
  q('a-h').setAttribute('stroke',hc); q('a-m').setAttribute('stroke',hc); q('a-dot').setAttribute('fill',hc);
  q('a-ring').setAttribute('stroke',tc);
  document.querySelectorAll('.a-tick').forEach(el=>el.setAttribute('stroke',tc));
  document.querySelectorAll('.a-num').forEach(el=>el.setAttribute('fill',nc));

  document.querySelectorAll('.flip-card').forEach(el=>el.style.background=t.fc);

  document.querySelectorAll('.bit.on').forEach(el=>el.style.background=t.dot);
  document.querySelectorAll('.bit.off').forEach(el=>el.style.background=t.text);
}

function setFace(f) {
  S.face=f;
  document.querySelectorAll('.face').forEach(el=>el.classList.remove('on'));
  q('face-'+f).classList.add('on');
  document.querySelectorAll('.fb').forEach(el=>el.classList.remove('on'));
  q('fb-'+f).classList.add('on');
  applyTheme(S.theme);
}

function tog12h()   { S.h12=!S.h12;     q('tb12h').classList.toggle('on',S.h12);   applyTheme(S.theme); }
function togSmooth(){ S.smooth=!S.smooth; q('tbsmo').classList.toggle('on',S.smooth); applyTheme(S.theme); }
function togSec()   {
  S.secs=!S.secs;
  q('tbsec').classList.toggle('on',S.secs);
  q('fsep').style.display=S.secs?'':'none';
  q('fsg').style.display=S.secs?'':'none';
  q('bin-s-row').style.display=S.secs?'':'none';
  applyTheme(S.theme);
}

function rotHand(id,deg) { q(id).setAttribute('transform','rotate('+deg+',100,100)'); }

function flipSet(cid,vid,v) {
  const card=q(cid), val=q(vid);
  if (val.textContent!==v) { val.textContent=v; card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop'); }
}

function setBits(row,n) {
  const dot=THEMES[S.theme].dot, txt=THEMES[S.theme].text;
  for (let i=5;i>=0;i--) {
    const el=q('b-'+row+'-'+i), on=!!(n&(1<<i));
    el.className='bit '+(on?'on':'off'); el.style.background=on?dot:txt;
  }
}

const ONES=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];
const TENS=['','','twenty','thirty','forty','fifty'];
function numW(n){ return n<=20?ONES[n]:TENS[Math.floor(n/10)]+(n%10?'-'+ONES[n%10]:''); }
function toWord(now) {
  const h=now.getHours(), m=now.getMinutes();
  const h12=h%12||12, nxt=(h%12+1)%12||12, hw=numW(h12), nw=numW(nxt);
  const sfx=h<12?' in the morning':h<17?' in the afternoon':' in the evening';
  if(m===0)  return 'It is '+hw+sfx;
  if(m<5)    return 'It is just past '+hw;
  if(m<10)   return 'It is five past '+hw;
  if(m<15)   return 'It is ten past '+hw;
  if(m<20)   return 'It is quarter past '+hw;
  if(m<25)   return 'It is twenty past '+hw;
  if(m<30)   return 'It is twenty-five past '+hw;
  if(m<35)   return 'It is half past '+hw;
  if(m<40)   return 'It is twenty-five to '+nw;
  if(m<45)   return 'It is twenty to '+nw;
  if(m<50)   return 'It is quarter to '+nw;
  if(m<55)   return 'It is ten to '+nw;
  return 'It is five to '+nw;
}

let tmr;
function tick() {
  const now=new Date();
  const rh=now.getHours(), rm=now.getMinutes(), rs=now.getSeconds(), rms=now.getMilliseconds();
  let dh=rh, ampm='';
  if(S.h12){ ampm=rh>=12?'PM':'AM'; dh=rh%12||12; }
  const hs=String(dh).padStart(2,'0'), ms=String(rm).padStart(2,'0'), ss=String(rs).padStart(2,'0');

  // Digital
  q('d-time').textContent=hs+':'+ms+(S.secs?':'+ss:'');
  q('d-ampm').textContent=S.h12?ampm:(rh<12?'AM':'PM');
  q('d-date').textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  // Analog
  const fs=S.smooth?rs+rms/1000:rs, fm=rm+fs/60, fh=(rh%12)+fm/60;
  rotHand('a-h',fh*30); rotHand('a-m',fm*6);
  q('a-s').style.display=S.secs?'':'none';
  if(S.secs) rotHand('a-s',fs*6);
  q('a-date').textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});

  // Flip
  flipSet('fc-h0','fv-h0',hs[0]); flipSet('fc-h1','fv-h1',hs[1]);
  flipSet('fc-m0','fv-m0',ms[0]); flipSet('fc-m1','fv-m1',ms[1]);
  flipSet('fc-s0','fv-s0',ss[0]); flipSet('fc-s1','fv-s1',ss[1]);
  q('f-ampm').textContent=S.h12?ampm:'';

  // Binary
  setBits('h',dh); setBits('m',rm); if(S.secs) setBits('s',rs);
  q('bv-h').textContent=hs; q('bv-m').textContent=ms; q('bv-s').textContent=ss;

  // Word
  q('w-txt').textContent=toWord(now);
  q('w-exact').textContent=hs+':'+ms+':'+ss+(S.h12?' '+ampm:'');

  clearTimeout(tmr);
  tmr=setTimeout(tick, S.smooth?50:1000-now.getTime()%1000+20);
}

applyTheme(0);
tick();
</script>
</body>
</html>
